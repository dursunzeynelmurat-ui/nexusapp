services:
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-nexus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB:-nexus_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nexus}"]
      interval: 10s
      timeout:  5s
      retries:  5

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test:     ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5

  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL:           postgresql://${POSTGRES_USER:-nexus}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-nexus_db}
      REDIS_URL:              redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET:             ${JWT_SECRET}
      JWT_REFRESH_SECRET:     ${JWT_REFRESH_SECRET}
      SESSION_ENCRYPTION_KEY: ${SESSION_ENCRYPTION_KEY}
      STORAGE_PROVIDER:       ${STORAGE_PROVIDER:-local}
      AWS_ACCESS_KEY_ID:      ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY:  ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION:             ${AWS_REGION:-us-east-1}
      AWS_S3_BUCKET:          ${AWS_S3_BUCKET:-}
      LOCAL_UPLOAD_DIR:       /app/uploads
      JWT_ACCESS_EXPIRES_IN:  ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      DATABASE_WORKER_URL:    postgresql://${POSTGRES_USER:-nexus}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-nexus_db}
      CORS_ORIGIN:            https://appnexus.online,https://www.appnexus.online
      NODE_ENV:               production
      PORT:                   3000
    volumes:
      - sessions_data:/app/sessions
      - uploads_data:/app/uploads
      - backend_logs:/app/logs

  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
    restart: always
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    restart: always
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    command: "/bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"

  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data:
  redis_data:
  sessions_data:
  uploads_data:
  backend_logs:
  certbot_www:
  certbot_conf:
